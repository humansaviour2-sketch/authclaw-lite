name: Terraform IaC Gates

on:
  pull_request:
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform.yml"
  push:
    branches: [main, master]
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: authclaw-terraform-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-plan:
    name: Format, Validate, and Speculative Plan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AWS_ACCESS_KEY_ID: ci-placeholder
      AWS_SECRET_ACCESS_KEY: ci-placeholder
      AWS_EC2_METADATA_DISABLED: "true"
      TF_IN_AUTOMATION: "true"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.7

      - name: Check formatting
        run: terraform -chdir=infra/terraform fmt -check -recursive

      - name: Initialize without remote backend
        run: terraform -chdir=infra/terraform init -backend=false

      - name: Validate configuration
        run: terraform -chdir=infra/terraform validate

      - name: Speculative plan without refreshing cloud state
        run: terraform -chdir=infra/terraform plan -input=false -refresh=false -no-color -var-file=ci.tfvars.json -out=tfplan

      - name: Render plan summary
        run: terraform -chdir=infra/terraform show -no-color tfplan > terraform-plan.txt

      - name: Upload Terraform plan evidence
        uses: actions/upload-artifact@v7
        with:
          name: terraform-plan
          path: infra/terraform/terraform-plan.txt
