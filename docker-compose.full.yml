services:
  postgres:
    image: postgres:17
    container_name: authclaw-full-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-authclaw}
      POSTGRES_USER: ${POSTGRES_USER:-authclaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-authclaw}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - full_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-authclaw} -d ${POSTGRES_DB:-authclaw}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: authclaw-full-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  opa:
    image: openpolicyagent/opa:latest
    container_name: authclaw-full-opa
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "/policies"
    volumes:
      - ./infra/opa:/policies:ro
    ports:
      - "${OPA_PORT:-8181}:8181"

  presidio:
    image: mcr.microsoft.com/presidio-analyzer:latest
    container_name: authclaw-full-presidio
    ports:
      - "${PRESIDIO_PORT:-3000}:3000"

  kafka:
    image: docker.redpanda.com/redpandadata/redpanda:v23.2.19
    container_name: authclaw-full-kafka
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --default-log-level=info
      - --kafka-addr=INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      - --advertise-kafka-addr=INTERNAL://kafka:29092,EXTERNAL://localhost:9092
    ports:
      - "${KAFKA_PORT:-9092}:9092"

  kafka-init:
    image: docker.redpanda.com/redpandadata/redpanda:v23.2.19
    container_name: authclaw-full-kafka-init
    depends_on:
      - kafka
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        until rpk cluster info -X brokers=kafka:29092 >/dev/null 2>&1; do sleep 1; done;
        rpk topic create gateway.traffic --partitions 12 --replicas 1 --topic-config retention.ms=604800000 --topic-config cleanup.policy=delete -X brokers=kafka:29092 || true;
        rpk topic create audit.events --partitions 12 --replicas 1 --topic-config retention.ms=2592000000 --topic-config cleanup.policy=delete -X brokers=kafka:29092 || true;
        rpk topic create audit.deadletter --partitions 6 --replicas 1 --topic-config retention.ms=7776000000 --topic-config cleanup.policy=delete -X brokers=kafka:29092 || true;
        rpk topic list -X brokers=kafka:29092;

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: authclaw-full-clickhouse
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-authclaw}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-authclaw}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-authclaw}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - full_clickhouse_data:/var/lib/clickhouse
      - ./infra/clickhouse:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.demo
    container_name: authclaw-full-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opa:
        condition: service_started
      presidio:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
      clickhouse:
        condition: service_healthy
    environment:
      OWNER_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-authclaw}:${POSTGRES_PASSWORD:-authclaw}@postgres:5432/${POSTGRES_DB:-authclaw}
      APP_DATABASE_URL: postgresql+psycopg://${POSTGRES_APP_USER:-authclaw_app}:${POSTGRES_APP_PASSWORD:-authclaw_app}@postgres:5432/${POSTGRES_DB:-authclaw}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_APP_USER:-authclaw_app}:${POSTGRES_APP_PASSWORD:-authclaw_app}@postgres:5432/${POSTGRES_DB:-authclaw}
      POSTGRES_DB: ${POSTGRES_DB:-authclaw}
      POSTGRES_APP_USER: ${POSTGRES_APP_USER:-authclaw_app}
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD:-authclaw_app}
      REDIS_URL: redis://redis:6379
      OPA_URL: http://opa:8181
      PRESIDIO_URL: http://presidio:3000
      KAFKA_BROKERS: kafka:29092
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-authclaw}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-authclaw}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-authclaw}
      API_DEBUG: ${API_DEBUG:-false}
      AWS_ENABLED: ${AWS_ENABLED:-false}
      BEDROCK_ENABLED: ${BEDROCK_ENABLED:-false}
      AWS_SECRETS_MANAGER_ENABLED: ${AWS_SECRETS_MANAGER_ENABLED:-false}
      AUTHCLAW_ENV: ${AUTHCLAW_ENV:-local}
      JWT_SECRET: ${JWT_SECRET:-authclaw-full-local-jwt-secret}
      SESSION_SECRET: ${SESSION_SECRET:-authclaw-full-local-session-secret}
      ENVELOPE_KEY: ${ENVELOPE_KEY:-authclaw-full-local-envelope-key-v1}
      KMS_KEY_ID: ${KMS_KEY_ID:-full-local-key}
      DEMO_OTP_VISIBLE: ${DEMO_OTP_VISIBLE:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      SMTP_TLS: ${SMTP_TLS:-true}
      NEXT_PUBLIC_AUTHCLAW_DEMO_MODE: "false"
      PUBLIC_GATEWAY_URL: ${PUBLIC_GATEWAY_URL:-http://localhost:8080}
      ONBOARDING_SIGNUP_EMAIL_PER_HOUR: ${ONBOARDING_SIGNUP_EMAIL_PER_HOUR:-20}
      ONBOARDING_SIGNUP_IP_PER_DAY: ${ONBOARDING_SIGNUP_IP_PER_DAY:-100}
      ONBOARDING_VERIFY_IP_PER_HOUR: ${ONBOARDING_VERIFY_IP_PER_HOUR:-100}
      GATEWAY_RATE_LIMIT_ENABLED: ${GATEWAY_RATE_LIMIT_ENABLED:-true}
      GATEWAY_RATE_LIMIT_PER_MINUTE: ${GATEWAY_RATE_LIMIT_PER_MINUTE:-120}
      GATEWAY_RATE_LIMIT_BURST_10S: ${GATEWAY_RATE_LIMIT_BURST_10S:-30}
      GATEWAY_RATE_LIMIT_DAILY: ${GATEWAY_RATE_LIMIT_DAILY:-10000}
      GATEWAY_MAX_BODY_BYTES: ${GATEWAY_MAX_BODY_BYTES:-1048576}
      GATEWAY_MAX_DAILY_SPEND_USD: ${GATEWAY_MAX_DAILY_SPEND_USD:-25}
      GATEWAY_ESTIMATED_COST_PER_1K_REQUESTS_USD: ${GATEWAY_ESTIMATED_COST_PER_1K_REQUESTS_USD:-1}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    command: ["sh", "-c", "DATABASE_URL=\"$$OWNER_DATABASE_URL\" alembic upgrade head && DATABASE_URL=\"$$OWNER_DATABASE_URL\" python scripts/ensure_app_db_role.py && DATABASE_URL=\"$$APP_DATABASE_URL\" python -m uvicorn main:app --host 0.0.0.0 --port 8000"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()\""]
      interval: 10s
      timeout: 5s
      retries: 10

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile.demo
    container_name: authclaw-full-gateway
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
      opa:
        condition: service_started
      presidio:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
    environment:
      PORT: "8080"
      DATABASE_URL: postgresql://${POSTGRES_APP_USER:-authclaw_app}:${POSTGRES_APP_PASSWORD:-authclaw_app}@postgres:5432/${POSTGRES_DB:-authclaw}?sslmode=disable
      REDIS_URL: redis://redis:6379
      OPA_URL: http://opa:8181
      PRESIDIO_URL: http://presidio:3000
      KAFKA_BROKERS: kafka:29092
      ENVELOPE_KEY: ${ENVELOPE_KEY:-authclaw-full-local-envelope-key-v1}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      COHERE_BASE_URL: ${COHERE_BASE_URL:-https://api.cohere.ai}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com}
      AZURE_OPENAI_BASE_URL: ${AZURE_OPENAI_BASE_URL:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      AWS_ENABLED: ${AWS_ENABLED:-false}
      BEDROCK_ENABLED: ${BEDROCK_ENABLED:-false}
      AUTHCLAW_ENV: ${AUTHCLAW_ENV:-local}
      AUDIT_FAIL_CLOSED: ${AUDIT_FAIL_CLOSED:-false}
      AUDIT_OUTBOX_PATH: /var/lib/authclaw-gateway/audit-outbox.ndjson
      GATEWAY_RATE_LIMIT_ENABLED: ${GATEWAY_RATE_LIMIT_ENABLED:-true}
      GATEWAY_RATE_LIMIT_PER_MINUTE: ${GATEWAY_RATE_LIMIT_PER_MINUTE:-120}
      GATEWAY_RATE_LIMIT_BURST_10S: ${GATEWAY_RATE_LIMIT_BURST_10S:-30}
      GATEWAY_RATE_LIMIT_DAILY: ${GATEWAY_RATE_LIMIT_DAILY:-10000}
      GATEWAY_MAX_BODY_BYTES: ${GATEWAY_MAX_BODY_BYTES:-1048576}
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    volumes:
      - full_gateway_audit_outbox:/var/lib/authclaw-gateway

  audit_consumer:
    build:
      context: ./audit_consumer
      dockerfile: Dockerfile
    container_name: authclaw-full-audit-consumer
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      clickhouse:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPICS: gateway.traffic,audit.events
      KAFKA_DLQ_TOPIC: audit.deadletter
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-authclaw}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-authclaw}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-authclaw}
      AUDIT_CONSUMER_METRICS_PORT: "9108"
    ports:
      - "${AUDIT_CONSUMER_METRICS_PORT:-9108}:9108"
    restart: on-failure

  console:
    build:
      context: ./console
      dockerfile: Dockerfile.demo
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_GATEWAY_URL: ${NEXT_PUBLIC_GATEWAY_URL:-http://localhost:8080}
        NEXT_PUBLIC_AUTHCLAW_DEMO_MODE: "false"
    container_name: authclaw-full-console
    depends_on:
      backend:
        condition: service_healthy
      gateway:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${POSTGRES_APP_USER:-authclaw_app}:${POSTGRES_APP_PASSWORD:-authclaw_app}@postgres:5432/${POSTGRES_DB:-authclaw}
      API_URL: http://backend:8000
      GATEWAY_INTERNAL_URL: http://gateway:8080
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_GATEWAY_URL: ${NEXT_PUBLIC_GATEWAY_URL:-http://localhost:8080}
      NEXT_PUBLIC_AUTHCLAW_DEMO_MODE: "false"
      AUTHCLAW_COOKIE_SECURE: ${AUTHCLAW_COOKIE_SECURE:-false}
      SESSION_SECRET: ${SESSION_SECRET:-authclaw-full-local-session-secret}
      NODE_ENV: production
    ports:
      - "${CONSOLE_PORT:-3001}:3001"

volumes:
  full_postgres_data:
  full_clickhouse_data:
  full_gateway_audit_outbox:
