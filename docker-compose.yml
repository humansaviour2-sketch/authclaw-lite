version: "3.9"

services:

  postgres:
    image: postgres:17
    container_name: authclaw-postgres
    environment:
      POSTGRES_DB: authclaw
      POSTGRES_USER: authclaw
      POSTGRES_PASSWORD: authclaw
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres:/docker-entrypoint-initdb.d

  redis:
    image: redis:7
    container_name: authclaw-redis
    ports:
      - "6379:6379"

  opa:
    image: openpolicyagent/opa:latest
    container_name: authclaw-opa
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "/policies"
    volumes:
      - ./infra/opa:/policies
    ports:
      - "8181:8181"

  presidio:
    image: mcr.microsoft.com/presidio-analyzer:latest
    container_name: authclaw-presidio
    ports:
      - "3000:3000"

  kafka:
    image: docker.redpanda.com/redpandadata/redpanda:v23.2.19
    container_name: authclaw-kafka
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --default-log-level=info
      - --kafka-addr=INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      - --advertise-kafka-addr=INTERNAL://kafka:29092,EXTERNAL://localhost:9092
    ports:
      - "9092:9092"

  kafka-init:
    image: docker.redpanda.com/redpandadata/redpanda:v23.2.19
    container_name: authclaw-kafka-init
    depends_on:
      - kafka
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        until rpk cluster info -X brokers=kafka:29092 >/dev/null 2>&1; do sleep 1; done;
        rpk topic create gateway.traffic --partitions 12 --replicas 1 --topic-config retention.ms=604800000 --topic-config cleanup.policy=delete -X brokers=kafka:29092 || true;
        rpk topic create audit.events --partitions 12 --replicas 1 --topic-config retention.ms=2592000000 --topic-config cleanup.policy=delete -X brokers=kafka:29092 || true;
        rpk topic create audit.deadletter --partitions 6 --replicas 1 --topic-config retention.ms=7776000000 --topic-config cleanup.policy=delete -X brokers=kafka:29092 || true;
        rpk topic list -X brokers=kafka:29092;

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: authclaw-clickhouse
    environment:
      CLICKHOUSE_DB: authclaw
      CLICKHOUSE_USER: authclaw
      CLICKHOUSE_PASSWORD: authclaw
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native TCP
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infra/clickhouse:/docker-entrypoint-initdb.d

  audit_consumer:
    build:
      context: ./audit_consumer
      dockerfile: Dockerfile
    container_name: authclaw-audit-consumer
    depends_on:
      - kafka-init
      - clickhouse
    environment:
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPICS: gateway.traffic,audit.events
      KAFKA_DLQ_TOPIC: audit.deadletter
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_DB: authclaw
      CLICKHOUSE_USER: authclaw
      CLICKHOUSE_PASSWORD: authclaw
      AUDIT_CONSUMER_METRICS_PORT: "9108"
    ports:
      - "9108:9108"
    restart: on-failure

volumes:
  postgres_data:
  clickhouse_data:
